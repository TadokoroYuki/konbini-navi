version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Setting build environment..."
        - export API_URL=http://k8s-default-konbinin-d154cd8c14-537123251.ap-northeast-1.elb.amazonaws.com/v1
        - cd apps/mobile
        - npm ci
    build:
      commands:
        - echo "Building Expo Web..."
        - npx expo export:web --output-dir dist
  artifacts:
    baseDirectory: apps/mobile/dist
    files:
      - '**/*'
  cache:
    paths:
      - apps/mobile/node_modules/**/*
env:
  variables:
    APP_VARIANT: production
    API_URL: http://k8s-default-konbinin-d154cd8c14-537123251.ap-northeast-1.elb.amazonaws.com/v1
