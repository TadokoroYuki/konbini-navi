version: 1
applications:
  - appRoot: apps/mobile
    env:
      variables:
        APP_VARIANT: production
        API_URL: http://k8s-default-konbinin-d154cd8c14-537123251.ap-northeast-1.elb.amazonaws.com/v1
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - npm ci
        build:
          commands:
            - echo "Building Expo Web..."
            - npx expo export:web --output-dir dist
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
