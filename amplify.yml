version: 1

applications:
  - appRoot: apps/mobile
    envName: prod
    buildSpec: |
      version: 0.1
      phases:
        pre_build:
          commands:
            - echo "Setting build environment..."
            - export API_URL=http://k8s-default-konbinin-d154cd8c14-537123251.ap-northeast-1.elb.amazonaws.com/v1
            - npm install -g pnpm
        install:
          commands:
            - echo "Installing dependencies..."
            - npm install -g expo-cli
            - pnpm install
        build:
          commands:
            - echo "Building Expo Web..."
            - cd apps/mobile && npx expo export:web --output-dir dist
      artifacts:
        files:
          - '**/*'
        baseDirectory: apps/mobile/dist
      cache:
        paths:
          - 'node_modules/**/*'
          - 'apps/mobile/node_modules/**/*'
    environmentVariables:
      - name: APP_VARIANT
        value: production
      - name: API_URL
        value: http://k8s-default-konbinin-d154cd8c14-537123251.ap-northeast-1.elb.amazonaws.com/v1
