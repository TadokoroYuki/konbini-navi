version: 1
applications:
  - appRoot: apps/mobile
    env:
      variables:
        APP_VARIANT: production
        API_URL: http://k8s-default-konbinin-d154cd8c14-537123251.ap-northeast-1.elb.amazonaws.com/v1
        # Cognito settings
        COGNITO_USER_POOL_ID: ap-northeast-1_z2FPUWWJl
        COGNITO_CLIENT_ID: 3g2k2ssi2t3kjc49dg1kpk358d
        COGNITO_REGION: ap-northeast-1
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing pnpm..."
            - npm install -g pnpm
            - echo "Installing dependencies..."
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - echo "Building Expo Web..."
            - cd apps/mobile && npx expo export --platform web
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
