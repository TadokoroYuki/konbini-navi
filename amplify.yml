version: 1
applications:
  - appRoot: apps/mobile
    env:
      variables:
        APP_VARIANT: production
        API_URL: https://8ogxsuw2x7.execute-api.ap-northeast-1.amazonaws.com/prod
        # Cognito settings
        COGNITO_USER_POOL_ID: ap-northeast-1_QLQs4UifP
        COGNITO_CLIENT_ID: 19fgos893v1n3uif33l2pl430l
        COGNITO_REGION: ap-northeast-1
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing pnpm..."
            - npm install -g pnpm
            - echo "Installing dependencies..."
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - echo "Building Expo Web..."
            - cd apps/mobile && npx expo export --platform web
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
