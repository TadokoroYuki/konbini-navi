version: 1

applications:
  - appRoot: apps/mobile
    envName: prod
    buildSpec: |
      version: 0.1
      phases:
        pre_build:
          commands:
            - echo "Setting build environment..."
            - export APP_VARIANT=production
            - npm install -g pnpm
        install:
          commands:
            - echo "Installing dependencies..."
            - npm install -g expo-cli
            - pnpm install
        build:
          commands:
            - echo "Building Expo Web..."
            - cd apps/mobile && npx expo export:web --output-dir dist
      artifacts:
        files:
          - '**/*'
        baseDirectory: apps/mobile/dist
      cache:
        paths:
          - 'node_modules/**/*'
          - 'apps/mobile/node_modules/**/*'
