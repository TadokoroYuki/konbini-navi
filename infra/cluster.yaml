apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: konbini-navi-cluster
  region: ap-northeast-1
  version: "1.31"

# 既存VPCを使用
vpc:
  id: vpc-03c16944ae82f81b2
  subnets:
    public:
      ap-northeast-1a:
        id: subnet-0e1a41cdcc7a956b8
      ap-northeast-1c:
        id: subnet-0a8a8ecd779c3da37
    private:
      ap-northeast-1a:
        id: subnet-058459b0dd3a190e1
      ap-northeast-1c:
        id: subnet-0839e0cff725ea3dd

# マネージドノードグループ（コスト最適化）
managedNodeGroups:
  - name: konbini-navi-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    privateNetworking: true
    labels:
      role: worker
    tags:
      Project: konbini-navi
      Environment: production

# AWS Load Balancer ControllerのためのIAMサービスアカウント
iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      wellKnownPolicies:
        awsLoadBalancerController: true

# CloudWatch Logsへのログ送信
cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]
