events {
    worker_connections 1024;
}

http {
    upstream products_backend {
        server products:7111;
    }

    upstream records_backend {
        server records:8810;
    }

    upstream nutrition_backend {
        server nutrition:1056;
    }

    upstream recommendations_backend {
        server recommendations:2525;
    }

    server {
        listen 80;

        # Strip CORS headers from upstream services (nginx handles CORS)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # CORS headers for all responses
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Gateway health check
        location = /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Products service
        location /v1/products {
            proxy_pass http://products_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Records service
        location ~ ^/v1/users/[^/]+/records {
            proxy_pass http://records_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Profile service (served by nutrition)
        location ~ ^/v1/users/[^/]+/profile {
            proxy_pass http://nutrition_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Nutrition service
        location ~ ^/v1/users/[^/]+/nutrition {
            proxy_pass http://nutrition_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Recommendations service
        location ~ ^/v1/users/[^/]+/recommendations {
            proxy_pass http://recommendations_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
