apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations
  namespace: default
  labels:
    app: recommendations
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendations
  template:
    metadata:
      labels:
        app: recommendations
    spec:
      containers:
      - name: recommendations
        image: 974857491219.dkr.ecr.ap-northeast-1.amazonaws.com/konbini-navi-api:recommendations-latest
        ports:
        - containerPort: 2525
          name: http
        env:
        - name: HTTP_PORT
          value: "2525"
        - name: NUTRITION_GRPC_ADDR
          value: "nutrition:1057"
        - name: PRODUCTS_GRPC_ADDR
          value: "products:7112"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 2525
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 2525
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: recommendations
  namespace: default
  labels:
    app: recommendations
spec:
  type: ClusterIP
  ports:
  - port: 2525
    targetPort: 2525
    protocol: TCP
    name: http
  selector:
    app: recommendations
