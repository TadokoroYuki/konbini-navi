apiVersion: apps/v1
kind: Deployment
metadata:
  name: records
  namespace: default
  labels:
    app: records
spec:
  replicas: 2
  selector:
    matchLabels:
      app: records
  template:
    metadata:
      labels:
        app: records
    spec:
      containers:
      - name: records
        image: 974857491219.dkr.ecr.ap-northeast-1.amazonaws.com/konbini-navi-api:records-latest
        ports:
        - containerPort: 8810
          name: http
        - containerPort: 8811
          name: grpc
        env:
        - name: HTTP_PORT
          value: "8810"
        - name: GRPC_PORT
          value: "8811"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: PRODUCTS_GRPC_ADDR
          value: "products:7112"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8810
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8810
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: records
  namespace: default
  labels:
    app: records
spec:
  type: ClusterIP
  ports:
  - port: 8810
    targetPort: 8810
    protocol: TCP
    name: http
  - port: 8811
    targetPort: 8811
    protocol: TCP
    name: grpc
  selector:
    app: records
