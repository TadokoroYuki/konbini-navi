apiVersion: apps/v1
kind: Deployment
metadata:
  name: konbini-navi-products
  namespace: default
  labels:
    app: konbini-navi-products
spec:
  replicas: 2
  selector:
    matchLabels:
      app: konbini-navi-products
  template:
    metadata:
      labels:
        app: konbini-navi-products
    spec:
      containers:
      - name: products
        image: 974857491219.dkr.ecr.ap-northeast-1.amazonaws.com/konbini-navi-api:latest
        command: ["/app/products"]
        ports:
        - containerPort: 7111
          name: http
        - containerPort: 7112
          name: grpc
        env:
        - name: HTTP_PORT
          value: "7111"
        - name: GRPC_PORT
          value: "7112"
        - name: DATABASE_URL
          value: "postgres://postgres:konbini-secure-pass-2026@postgres:5432/konbini_navi?sslmode=disable"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 7111
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7111
          initialDelaySeconds: 5
          periodSeconds: 5
