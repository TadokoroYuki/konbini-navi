apiVersion: apps/v1
kind: Deployment
metadata:
  name: products
  namespace: default
  labels:
    app: products
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products
  template:
    metadata:
      labels:
        app: products
    spec:
      containers:
      - name: products
        image: 974857491219.dkr.ecr.ap-northeast-1.amazonaws.com/konbini-navi-api:products-latest
        ports:
        - containerPort: 7111
          name: http
        - containerPort: 7112
          name: grpc
        env:
        - name: HTTP_PORT
          value: "7111"
        - name: GRPC_PORT
          value: "7112"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 7111
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7111
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: products
  namespace: default
  labels:
    app: products
spec:
  type: ClusterIP
  ports:
  - port: 7111
    targetPort: 7111
    protocol: TCP
    name: http
  - port: 7112
    targetPort: 7112
    protocol: TCP
    name: grpc
  selector:
    app: products
