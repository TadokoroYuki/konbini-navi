apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutrition
  namespace: default
  labels:
    app: nutrition
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nutrition
  template:
    metadata:
      labels:
        app: nutrition
    spec:
      containers:
      - name: nutrition
        image: 974857491219.dkr.ecr.ap-northeast-1.amazonaws.com/konbini-navi-api:nutrition-latest
        ports:
        - containerPort: 1056
          name: http
        - containerPort: 1057
          name: grpc
        env:
        - name: HTTP_PORT
          value: "1056"
        - name: GRPC_PORT
          value: "1057"
        - name: RECORDS_GRPC_ADDR
          value: "records:8811"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 1056
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 1056
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nutrition
  namespace: default
  labels:
    app: nutrition
spec:
  type: ClusterIP
  ports:
  - port: 1056
    targetPort: 1056
    protocol: TCP
    name: http
  - port: 1057
    targetPort: 1057
    protocol: TCP
    name: grpc
  selector:
    app: nutrition
