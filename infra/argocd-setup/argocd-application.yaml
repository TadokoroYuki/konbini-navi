apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: konbini-navi-app
  namespace: argocd
  annotations:
    # ArgoCD Image Updater annotations
    argocd-image-updater.argoproj.io/image-list: konbini-navi-api=974857491219.dkr.ecr.ap-northeast-1.amazonaws.com/konbini-navi-api
    argocd-image-updater.argoproj.io/konbini-navi-api.update-strategy: latest
    argocd-image-updater.argoproj.io/konbini-navi-api.allow-tags: regexp:^[0-9a-f]{7}$|latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: infra/k8s
    repoURL: https://github.com/TadokoroYuki/konbini-navi.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
