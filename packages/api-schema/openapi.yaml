openapi: 3.0.3
info:
  title: Konbini Navi API
  version: 2.0.0
  description: コンビニ食事管理アプリAPI（マイクロサービス構成）

servers:
  - url: http://localhost:8080/v1
    description: Local development (nginx API gateway)
  - url: https://api.example.com/v1
    description: Production (ALB Ingress)

paths:
  /products:
    get:
      operationId: searchProducts
      summary: 商品検索
      tags: [products]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: キーワード検索（ILIKE部分一致）
        - name: brand
          in: query
          schema:
            $ref: "#/components/schemas/Brand"
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/Category"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: 商品一覧
          content:
            application/json:
              schema:
                type: object
                required: [products]
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      summary: 商品詳細
      tags: [products]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 商品詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: 商品が見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{userId}/records:
    get:
      operationId: listRecords
      summary: 食事記録一覧
      tags: [records]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "YYYY-MM-DD形式。省略時はユーザーの全記録を返す"
      responses:
        "200":
          description: 食事記録一覧
          content:
            application/json:
              schema:
                type: object
                required: [records]
                properties:
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/Record"

    post:
      operationId: createRecord
      summary: 食事記録作成
      tags: [records]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordRequest"
      responses:
        "201":
          description: 食事記録作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{userId}/records/{recordId}:
    delete:
      operationId: deleteRecord
      summary: 食事記録削除
      tags: [records]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 削除成功
        "404":
          description: 記録が見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{userId}/nutrition:
    get:
      operationId: getNutrition
      summary: 栄養バランス取得
      tags: [nutrition]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "YYYY-MM-DD形式。省略時は当日"
      responses:
        "200":
          description: 栄養バランス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionSummary"

  /users/{userId}/recommendations:
    get:
      operationId: getRecommendation
      summary: おすすめ商品取得
      description: |
        栄養不足と味の好みに基づき、最適な1商品を推薦する。
        キャッシュ（recommendationsテーブル）がdate一致でヒットすればそれを返し、
        なければリアルタイム計算してキャッシュに保存する。
      tags: [recommendations]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "YYYY-MM-DD形式。省略時は当日"
      responses:
        "200":
          description: おすすめ商品（該当なしの場合 recommendation は null）
          content:
            application/json:
              schema:
                type: object
                required: [recommendation]
                properties:
                  recommendation:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/RecommendationResult"

  /users/{userId}/recommendations/refresh:
    post:
      operationId: refreshRecommendation
      summary: おすすめ再計算（内部用）
      description: |
        records サービスから記録の作成・削除時に非同期で呼び出される。
        キャッシュを削除し、リアルタイムで再計算・保存する。
      tags: [recommendations]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 再計算結果
          content:
            application/json:
              schema:
                type: object
                required: [recommendation]
                properties:
                  recommendation:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/RecommendationResult"

  /health:
    get:
      operationId: healthCheck
      summary: ヘルスチェック（全サービス共通）
      tags: [health]
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

components:
  schemas:
    Brand:
      type: string
      enum: [seven_eleven, family_mart, lawson]
      description: コンビニブランド

    Category:
      type: string
      enum: [onigiri, bento, sandwich, salad, soup, noodle, bread, sweets, drink, side_dish]
      description: 商品カテゴリ

    MealType:
      type: string
      enum: [breakfast, lunch, dinner, snack]
      description: 食事タイプ

    NutritionStatusEnum:
      type: string
      enum: [deficient, adequate, excessive]
      description: "不足(ratio<0.7) / 適量(0.7-1.2) / 多い(>1.2)"

    Nutrition:
      type: object
      required: [calories, protein, fat, carbs]
      properties:
        calories:
          type: number
          description: カロリー(kcal)
        protein:
          type: number
          description: タンパク質(g)
        fat:
          type: number
          description: 脂質(g)
        carbs:
          type: number
          description: 炭水化物(g)
        fiber:
          type: number
          description: 食物繊維(g)。omitemptyのため0の場合省略される
        salt:
          type: number
          description: 食塩相当量(g)。omitemptyのため0の場合省略される

    Product:
      type: object
      required: [productId, name, brand, category, price, nutrition, imageUrl]
      properties:
        productId:
          type: string
        name:
          type: string
        brand:
          $ref: "#/components/schemas/Brand"
        category:
          $ref: "#/components/schemas/Category"
        price:
          type: integer
          description: 税込価格(円)
        nutrition:
          $ref: "#/components/schemas/Nutrition"
        imageUrl:
          type: string
        description:
          type: string
          description: 商品説明。omitemptyのため空の場合省略される

    Record:
      type: object
      required: [recordId, userId, productId, date, mealType, createdAt]
      properties:
        recordId:
          type: string
          description: ULID形式の記録ID
        userId:
          type: string
        productId:
          type: string
        product:
          $ref: "#/components/schemas/Product"
          description: 商品詳細。omitemptyのため省略される場合がある
        date:
          type: string
          format: date
        mealType:
          $ref: "#/components/schemas/MealType"
        createdAt:
          type: string
          format: date-time

    CreateRecordRequest:
      type: object
      required: [productId, date, mealType]
      properties:
        productId:
          type: string
        date:
          type: string
          format: date
        mealType:
          $ref: "#/components/schemas/MealType"

    NutrientStatus:
      type: object
      required: [actual, target, ratio, status]
      properties:
        actual:
          type: number
        target:
          type: number
        ratio:
          type: number
          description: actual / target
        status:
          $ref: "#/components/schemas/NutritionStatusEnum"

    NutritionSummary:
      type: object
      required: [date, calories, protein, fat, carbs]
      properties:
        date:
          type: string
          format: date
        calories:
          $ref: "#/components/schemas/NutrientStatus"
        protein:
          $ref: "#/components/schemas/NutrientStatus"
        fat:
          $ref: "#/components/schemas/NutrientStatus"
        carbs:
          $ref: "#/components/schemas/NutrientStatus"

    RecommendationResult:
      type: object
      required: [product, score]
      properties:
        product:
          $ref: "#/components/schemas/Product"
        score:
          type: number
          description: "コサイン類似度ベースのスコア (0.6*栄養類似度 + 0.4*味の好み類似度)"

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: "BAD_REQUEST | NOT_FOUND | INTERNAL"
        message:
          type: string
