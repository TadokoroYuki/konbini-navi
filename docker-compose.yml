version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: konbini-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: konbini_navi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - konbini-network

  redis:
    image: redis:7-alpine
    container_name: konbini-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - konbini-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: konbini-api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: konbini_navi
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - konbini-network
    restart: on-failure

volumes:
  postgres_data:
  redis_data:

networks:
  konbini-network:
    driver: bridge
