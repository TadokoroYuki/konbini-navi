version: '3.8'

x-api-common: &api-common
  build:
    context: ./apps/api
    dockerfile: Dockerfile
  restart: on-failure
  networks:
    - konbini-network

services:
  postgres:
    image: postgres:15-alpine
    container_name: konbini-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: konbini_navi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - konbini-network

  products:
    <<: *api-common
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: products
    container_name: konbini-products
    environment:
      HTTP_PORT: "7111"
      GRPC_PORT: "7112"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/konbini_navi?sslmode=disable
    ports:
      - "7111:7111"
      - "7112:7112"
    depends_on:
      postgres:
        condition: service_healthy

  records:
    <<: *api-common
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: records
    container_name: konbini-records
    environment:
      HTTP_PORT: "8810"
      GRPC_PORT: "8811"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/konbini_navi?sslmode=disable
      PRODUCTS_GRPC_ADDR: products:7112
    ports:
      - "8810:8810"
      - "8811:8811"
    depends_on:
      postgres:
        condition: service_healthy
      products:
        condition: service_started

  nutrition:
    <<: *api-common
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: nutrition
    container_name: konbini-nutrition
    environment:
      HTTP_PORT: "1056"
      GRPC_PORT: "1057"
      RECORDS_GRPC_ADDR: records:8811
    ports:
      - "1056:1056"
      - "1057:1057"
    depends_on:
      records:
        condition: service_started

  recommendations:
    <<: *api-common
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: recommendations
    container_name: konbini-recommendations
    environment:
      HTTP_PORT: "2525"
      NUTRITION_GRPC_ADDR: nutrition:1057
      PRODUCTS_GRPC_ADDR: products:7112
    ports:
      - "2525:2525"
    depends_on:
      nutrition:
        condition: service_started
      products:
        condition: service_started

  api-gateway:
    image: nginx:alpine
    container_name: konbini-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - products
      - records
      - nutrition
      - recommendations
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - konbini-network
    restart: on-failure

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: konbini-swagger-ui
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    ports:
      - "8082:8080"
    volumes:
      - ./packages/api-schema/openapi.yaml:/openapi/openapi.yaml:ro
    networks:
      - konbini-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  konbini-network:
    driver: bridge
